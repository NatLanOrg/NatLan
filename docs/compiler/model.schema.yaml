$schema: http://json-schema.org/draft-07/schema#
$id: https://jazyk.org/schemas/model.schema.json
title: Jazyk Model Definitions
description: Shared definitions for the Jazyk compiler data model, referenced by the artifact schemas
definitions:
  confidence:
    description: Confidence in an extracted or resolved fact, from 0 to 1
    type: number
    minimum: 0
    maximum: 1
  multiplicity:
    description: UML multiplicity notation for one end of a relationship
    type: string
    pattern: '^(\*|\d+|\d+\.\.(\d+|\*))$'
    examples: ['1', '0..1', '1..*', '0..*', '*', '2..5']
  relationshipType:
    description: Relationship type, from strongest to weakest
    type: string
    enum:
      - generalization
      - realization
      - composition
      - aggregation
      - association
      - dependency
      - reference
  severity:
    description: Diagnostic severity. 'none' is a considered judgment that is recorded but not surfaced
    type: string
    enum:
      - error
      - warning
      - info
      - none
  linkage:
    description: Whether an entity is private to one document or part of its link interface
    type: string
    enum:
      - internal
      - external
  role:
    description: Whether a document defines an entity or only references it
    type: string
    enum:
      - definition
      - reference
  scope:
    description: >-
      The visibility of an entity for cross-file resolution, captured from the documentation. `public`
      (the default) resolves across the whole project; `private` stays within its own document; a named
      context (e.g. a microservice or bounded context) only resolves with same-named entities that share
      that scope
    type: string
    examples: ['public', 'private', 'billing', 'fulfillment']
  earsPattern:
    description: Parsed EARS pattern of a requirement
    type: object
    required:
      - type
    properties:
      type:
        type: string
        enum:
          - ubiquitous
          - event
          - state
          - unwanted
          - optional
          - complex
      trigger:
        type: string
      state:
        type: string
      condition:
        type: string
      response:
        type: string
  provenance:
    description: >-
      Where a fact came from. `section` is an internal reference in the object artifact, or a location
      URI in the linked artifact. `span` is a character range in the source
    type: array
    items:
      type: object
      properties:
        section:
          type: string
        span:
          type: array
          items:
            type: integer
            minimum: 0
          minItems: 2
          maxItems: 2
  diagnostic:
    description: A surfaced or recorded judgment about the spec. Persisted and sticky
    type: object
    required:
      - rule
      - severity
      - subjects
      - message
    properties:
      id:
        description: Stable id derived from the rule, the subjects, and a coarse fingerprint
        type: string
      rule:
        type: string
      severity:
        $ref: '#/definitions/severity'
      subjects:
        description: Node ids this diagnostic concerns (entity, requirement, relationship, or section)
        type: array
        items:
          type: string
      message:
        type: string
      reasoning:
        description: Why this severity or disposition was chosen
        type: string
      related:
        description: Other node or diagnostic ids involved
        type: array
        items:
          type: string
      lifecycle:
        type: string
        enum:
          - open
          - resolved
          - superseded
          - merged
      triage:
        description: Human set state. Survives recompilation
        type:
          - string
          - 'null'
        enum:
          - acknowledged
          - suppressed
          - wontfix
          - null
      firstSeen:
        type: string
      lastSeen:
        type: string
      provenance:
        $ref: '#/definitions/provenance'
      confidence:
        $ref: '#/definitions/confidence'
