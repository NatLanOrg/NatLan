$schema: http://json-schema.org/draft-07/schema#
$id: https://jazyk.org/schemas/linked-artifact.schema.json
title: Linked Artifact
description: Whole-program output after Linking resolve (L3). See linked-artifact.md
type: object
required:
  - entities
  - relationships
  - requirements
properties:
  entities:
    description: Global entity table (the symbol table)
    type: array
    items:
      type: object
      required:
        - globalId
        - canonicalName
        - members
      properties:
        globalId:
          type: string
        canonicalName:
          type: string
        aliases:
          type: array
          items:
            type: string
        scope:
          $ref: 'model.schema.json#/definitions/scope'
        members:
          description: The object artifacts that contribute to this entity
          type: array
          items:
            type: object
            required:
              - object
              - localId
            properties:
              object:
                type: string
              localId:
                type: string
              role:
                $ref: 'model.schema.json#/definitions/role'
        resolvedBy:
          description: How the entity was resolved by L2
          type: string
          enum:
            - direct-link
            - name-and-definition
            - name-only
        links:
          description: In-document links (relocations) that contributed to resolving this entity
          type: array
          items:
            type: string
        confidence:
          $ref: 'model.schema.json#/definitions/confidence'
  relationships:
    description: Global relationship graph
    type: array
    items:
      type: object
      required:
        - globalId
        - type
        - members
      properties:
        globalId:
          type: string
        type:
          $ref: 'model.schema.json#/definitions/relationshipType'
        members:
          type: array
          items:
            type: string
          minItems: 2
        requirements:
          type: array
          items:
            type: string
        cardinality:
          type: object
          additionalProperties:
            $ref: 'model.schema.json#/definitions/multiplicity'
        confidence:
          $ref: 'model.schema.json#/definitions/confidence'
  requirements:
    description: Global requirement index
    type: array
    items:
      type: object
      required:
        - globalId
        - earsText
        - entities
      properties:
        globalId:
          type: string
        earsText:
          type: string
        pattern:
          $ref: 'model.schema.json#/definitions/earsPattern'
        entities:
          type: array
          items:
            type: string
        relationship:
          type: string
        sourceSection:
          type: string
  diagnostics:
    type: array
    items:
      $ref: 'model.schema.json#/definitions/diagnostic'
