$schema: http://json-schema.org/draft-07/schema#
$id: https://jazyk.org/schemas/reviewed-artifact.schema.json
title: Reviewed Artifact
description: >-
  Whole-program output after Linking validation (L6). This is the linked artifact plus synthesized
  entity definitions, semantic diagnostics, and coverage. Entities also carry `globalDefinition` and
  `aliases`. See reviewed-artifact.md
allOf:
  - $ref: 'linked-artifact.schema.json'
  - type: object
    properties:
      coverage:
        type: array
        items:
          type: object
          required:
            - entity
          properties:
            entity:
              type: string
            behaviors:
              type: integer
              minimum: 0
            constraints:
              type: integer
              minimum: 0
            testsDerivable:
              type: integer
              minimum: 0
