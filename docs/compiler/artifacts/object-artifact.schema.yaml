$schema: http://json-schema.org/draft-07/schema#
$id: https://jazyk.org/schemas/object-artifact.schema.json
title: Object Artifact
description: Per-file output of the Compilation phase, one per documentation file. See object-artifact.md
type: object
required:
  - doc
  - sections
properties:
  doc:
    type: object
    required:
      - sourceFile
      - format
      - contentHash
    properties:
      sourceFile:
        type: string
        format: uri
      format:
        type: string
      contentHash:
        type: string
  sections:
    description: Map of section reference (the file-internal path after '#') to section
    type: object
    additionalProperties:
      type: object
      required:
        - title
      properties:
        title:
          type: string
        kind:
          type: string
          enum:
            - heading
            - list-item
            - code-block
            - blockquote
            - diagram
            - root
        order:
          type: integer
          minimum: 0
        parent:
          description: Internal reference of the parent section
          type: string
        raw:
          description: Verbatim source text, for reconstruction
          type: string
        contentHash:
          type: string
  entities:
    description: Map of localId to the entity as known in this document
    type: object
    additionalProperties:
      type: object
      required:
        - name
        - linkage
      properties:
        name:
          type: string
        aliases:
          type: array
          items:
            type: string
        linkage:
          $ref: 'model.schema.json#/definitions/linkage'
        role:
          $ref: 'model.schema.json#/definitions/role'
        scope:
          $ref: 'model.schema.json#/definitions/scope'
        localDefinition:
          type: string
        reasoning:
          type: string
        provenance:
          $ref: 'model.schema.json#/definitions/provenance'
        confidence:
          $ref: 'model.schema.json#/definitions/confidence'
  requirements:
    type: array
    items:
      type: object
      required:
        - id
        - earsText
        - entityRefs
      properties:
        id:
          type: string
        earsText:
          type: string
        pattern:
          $ref: 'model.schema.json#/definitions/earsPattern'
        entityRefs:
          type: array
          items:
            type: string
        impliedEdges:
          description: Edges this requirement produces among its entities
          type: array
          items:
            type: object
            required:
              - members
            properties:
              members:
                type: array
                items:
                  type: string
                minItems: 2
              type:
                $ref: 'model.schema.json#/definitions/relationshipType'
        relationshipRef:
          description: Back-pointer to the consolidated edge (A4)
          type: string
        sourceSection:
          type: string
        verificationMethod:
          type: string
        reasoning:
          type: string
        provenance:
          $ref: 'model.schema.json#/definitions/provenance'
        confidence:
          $ref: 'model.schema.json#/definitions/confidence'
  relationships:
    description: Consolidated edges within this document (A4)
    type: array
    items:
      type: object
      required:
        - localId
        - type
        - members
        - requirements
      properties:
        localId:
          type: string
        type:
          $ref: 'model.schema.json#/definitions/relationshipType'
        members:
          type: array
          items:
            type: string
          minItems: 2
        requirements:
          type: array
          items:
            type: string
        cardinality:
          type: object
          additionalProperties:
            $ref: 'model.schema.json#/definitions/multiplicity'
        provenance:
          $ref: 'model.schema.json#/definitions/provenance'
        confidence:
          $ref: 'model.schema.json#/definitions/confidence'
  externals:
    description: Unresolved cross-file references (relocations)
    type: array
    items:
      type: object
      required:
        - localId
        - name
      properties:
        localId:
          type: string
        name:
          type: string
        relocation:
          type: string
          format: uri
  diagnostics:
    type: array
    items:
      $ref: 'model.schema.json#/definitions/diagnostic'
