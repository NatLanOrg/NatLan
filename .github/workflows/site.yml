name: Deploy site

# Publishes bootstrap/site/ to GitHub Pages on every push to master that
# touches the site. The site is plain static HTML (Tailwind via CDN), so there
# is no build step: the directory is uploaded as-is.

on:
  push:
    branches: [master]
    paths:
      - 'bootstrap/site/**'
      - '.github/workflows/site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, never cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: bootstrap/site
      - id: deployment
        uses: actions/deploy-pages@v4
